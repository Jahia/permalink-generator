permalinkgenerator.siteSettings.title=Permalink Generator
permalinkgenerator.siteSettings.description=Configure how vanity URLs are automatically generated and maintained for this site.

jmix_permalinkGeneratorSettings=Permalink Generator
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode=Vanity URL mode 
permalinkgenerator.mode.label=Vanity URL mode

jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_SMART=Smart
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_FORCE=Force

permalinkgenerator.mode.SMART=Smart — respect manual vanities
permalinkgenerator.mode.FORCE=Force — always apply module rules

permalinkgenerator.mode.SMART.title=Smart (recommended)
permalinkgenerator.mode.SMART.help=The module creates vanity URLs for new and renamed pages, but never overwrites a vanity URL that was manually set by an editor. This is the safest mode when installing the module on a site that already has SEO-optimised URLs.

permalinkgenerator.mode.FORCE.title=Force
permalinkgenerator.mode.FORCE.help=The module always applies its rules. Existing manual vanity URLs will be demoted from default when the page title changes or the page is moved. Use this mode on new sites or after a planned SEO migration where you want the module to take full control.


jmix_permalinkExcluded=Permalink Generator
jmix_permalinkExcluded.label=Exclude this page from automatic vanity URL generation

permalinkgenerator.excludedPaths.label=Excluded paths
permalinkgenerator.excludedPaths.help=One JCR path per line. The module will not create or update vanity URLs for nodes under these paths.

