jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode=Modalità URL Vanity 

jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_SMART=Intelligente
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_FORCE=Forzato

permalinkgenerator.mode.SMART=Intelligente — rispetta le vanity manuali
permalinkgenerator.mode.FORCE=Forzato — applica sempre le regole del modulo

permalinkgenerator.mode.SMART.title=Intelligente (consigliato)
permalinkgenerator.mode.SMART.help=Il modulo crea URL vanity per le pagine nuove e rinominate, ma non sovrascrive mai un URL vanity impostato manualmente da un redattore. È la modalità più sicura per i siti che hanno già URL ottimizzati per la SEO.

permalinkgenerator.mode.FORCE.title=Forzato
permalinkgenerator.mode.FORCE.help=Il modulo applica sempre le sue regole. Gli URL vanity manuali verranno declassati dallo stato predefinito quando una pagina viene rinominata o spostata. Utilizzare questa modalità per siti nuovi o dopo una migrazione SEO pianificata.


jmix_permalinkExcluded=Generatore di permalink
