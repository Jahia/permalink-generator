permalinkgenerator.siteSettings.title=Generador de permalinks
permalinkgenerator.siteSettings.description=Configure cómo se generan y mantienen automáticamente las URLs permanentes para este sitio.

jmix_permalinkGeneratorSettings=Generador de permalinks
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode=Modo de URL vanity 

jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_SMART=Inteligente
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_FORCE=Forzado

permalinkgenerator.mode.SMART=Inteligente — respeta las vanity manuales
permalinkgenerator.mode.FORCE=Forzado — aplica siempre las reglas del módulo

permalinkgenerator.mode.SMART.title=Inteligente (recomendado)
permalinkgenerator.mode.SMART.help=El módulo crea URLs vanity para páginas nuevas y renombradas, pero nunca sobrescribe una URL vanity establecida manualmente por un editor. Este es el modo más seguro para sitios que ya tienen URLs optimizados para SEO.

permalinkgenerator.mode.FORCE.title=Forzado
permalinkgenerator.mode.FORCE.help=El módulo aplica siempre sus reglas. Las URLs vanity manuales serán degradadas del estado predeterminado cuando se renombre o mueva una página. Use este modo en sitios nuevos o tras una migración SEO planificada.


jmix_permalinkExcluded=Generador de permalinks
jmix_permalinkExcluded.label=Excluir esta página de la generación automática de URLs vanity

permalinkgenerator.excludedPaths.label=Rutas excluidas
permalinkgenerator.excludedPaths.help=Una ruta JCR por línea. El módulo no creará ni actualizará URLs vanity para nodos bajo estas rutas.

