permalinkgenerator.mode.SMART.title=Intelligent (empfohlen)
permalinkgenerator.mode.SMART.help=Das Modul erstellt Vanity-URLs für neue und umbenannte Seiten, überschreibt jedoch niemals eine manuell von einem Redakteur gesetzte Vanity-URL. Dies ist der sicherste Modus für Websites, die bereits SEO-optimierte URLs haben.

permalinkgenerator.mode.FORCE.title=Erzwungen
permalinkgenerator.mode.FORCE.help=Das Modul wendet seine Regeln immer an. Manuelle Vanity-URLs werden beim Umbenennen oder Verschieben einer Seite vom Standard-Status degradiert. Verwenden Sie diesen Modus bei neuen Websites oder nach einer geplanten SEO-Migration.


