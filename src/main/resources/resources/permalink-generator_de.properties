permalinkgenerator.excludedPaths.label=Ausgeschlossene Pfade
permalinkgenerator.excludedPaths.help=Ein JCR-Pfad pro Zeile. Das Modul erstellt oder aktualisiert keine Vanity-URLs für Knoten unter diesen Pfaden.

