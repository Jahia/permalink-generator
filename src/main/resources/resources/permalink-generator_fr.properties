permalinkgenerator.siteSettings.title=Générateur de permaliens
permalinkgenerator.siteSettings.description=Configurez la manière dont les URLs permanentes sont générées et maintenues automatiquement pour ce site.

jmix_permalinkGeneratorSettings=Générateur de permaliens
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode=Mode de génération des vanity URLs 

jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_SMART=Intelligent
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_FORCE=Forcé

permalinkgenerator.mode.SMART=Intelligent — respecte les vanity manuelles
permalinkgenerator.mode.FORCE=Forcé — applique toujours les règles du module

permalinkgenerator.mode.SMART.title=Intelligent (recommandé)
permalinkgenerator.mode.SMART.help=Le module crée des vanity URLs pour les nouvelles pages et les pages retournées, mais ne remplace jamais une vanity définie manuellement par un éditeur. C’est le mode le plus sûr pour les sites ayant déjà des URLs optimisées pour le référencement.

permalinkgenerator.mode.FORCE.title=Forcé
permalinkgenerator.mode.FORCE.help=Le module applique toujours ses règles. Les vanity URLs manuelles seront déclassées du statut « par défaut » lors d’un renommage ou d’un déplacement de page. À utiliser sur les nouveaux sites ou après une migration SEO planifiée.


jmix_permalinkExcluded=Générateur de permaliens
jmix_permalinkExcluded.label=Exclure cette page de la génération automatique des vanity URLs

permalinkgenerator.excludedPaths.label=Chemins exclus
permalinkgenerator.excludedPaths.help=Un chemin JCR par ligne. Le module ne créera ni ne mettra à jour les vanity URLs pour les nœuds sous ces chemins.

