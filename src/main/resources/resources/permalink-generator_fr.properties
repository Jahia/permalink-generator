permalinkgenerator.mode.SMART.title=Intelligent (recommand\u00e9)
permalinkgenerator.mode.SMART.help=Le module cr\u00e9e des vanity URLs pour les nouvelles pages et les pages retourn\u00e9es, mais ne remplace jamais une vanity d\u00e9finie manuellement par un \u00e9diteur. C'est le mode le plus s\u00fbr pour les sites ayant d\u00e9j\u00e0 des URLs optimis\u00e9es pour le r\u00e9f\u00e9rencement.

permalinkgenerator.mode.FORCE.title=Forc\u00e9
permalinkgenerator.mode.FORCE.help=Le module applique toujours ses r\u00e8gles. Les vanity URLs manuelles seront d\u00e9class\u00e9es du statut \u00ab\u00a0par d\u00e9faut\u00a0\u00bb lors d'un renommage ou d'un d\u00e9placement de page. \u00c0 utiliser sur les nouveaux sites ou apr\u00e8s une migration SEO planifi\u00e9e.


