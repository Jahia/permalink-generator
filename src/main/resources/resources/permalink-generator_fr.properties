permalinkgenerator.regen.confirm.body=Cette op\u00e9ration remplacera les vanity URLs existantes par de nouvelles valeurs calcul\u00e9es. Toute vanity URL cr\u00e9\u00e9e manuellement qui entre en conflit avec la nouvelle URL calcul\u00e9e sera d\u00e9class\u00e9e du statut \u00ab\u00a0par d\u00e9faut\u00a0\u00bb. Les vanity remplac\u00e9es ne sont pas supprim\u00e9es \u2014 elles deviennent des entr\u00e9es de redirection, donc les liens existants continueront de fonctionner. Proc\u00e9dez avec pr\u00e9caution.
