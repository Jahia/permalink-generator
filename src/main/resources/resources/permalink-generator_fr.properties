permalinkgenerator.regen.confirm.title=Confirmer la régénération
permalinkgenerator.regen.confirm.body=Cette opération remplacera les vanity URLs existantes par les valeurs calculées par le module. Toute vanity manuelle en conflit avec la nouvelle URL calculée sera déclassée du statut « par défaut ». Les vanities remplacées sont conservées comme redirections — les liens existants continueront de fonctionner.
