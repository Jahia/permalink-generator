permalinkgenerator.siteSettings.title=Gerador de permalinks
permalinkgenerator.siteSettings.description=Configure como os URLs permanentes são gerados e mantidos automaticamente para este site.

jmix_permalinkGeneratorSettings=Gerador de permalinks
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode=Modo de URL vanity 

jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_SMART=Inteligente
jmix_permalinkGeneratorSettings.j:permalinkGeneratorMode_FORCE=Forçado

permalinkgenerator.mode.SMART=Inteligente — respeita vanities manuais
permalinkgenerator.mode.FORCE=Forçado — aplica sempre as regras do módulo

permalinkgenerator.mode.SMART.title=Inteligente (recomendado)
permalinkgenerator.mode.SMART.help=O módulo cria URLs vanity para páginas novas e renomeadas, mas nunca substitui um URL vanity definido manualmente por um editor. Este é o modo mais seguro para sites que já possuem URLs optimizados para SEO.

permalinkgenerator.mode.FORCE.title=Forçado
permalinkgenerator.mode.FORCE.help=O módulo aplica sempre as suas regras. Os URLs vanity manuais serão rebaixados do estado padrão quando uma página for renomeada ou movida. Use este modo em novos sites ou após uma migração SEO planeada.


